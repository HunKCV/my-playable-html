<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="ad.orientation" content="portrait">
<title>뽑기 게임</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --px: 4px; /* 픽셀 단위 */
  --bg:      #0d0221;
  --bg2:     #1a0535;
  --panel:   #160430;
  --border:  #6a1fc2;
  --border2: #ff2d78;
  --cyan:    #00e5ff;
  --gold:    #ffe600;
  --white:   #e8d8ff;
  --dark:    #08010f;
  --btn-top: #ff3fa4;
  --btn-bot: #9b0042;
  --box1: #ff4060; --box1d: #8b0020;
  --box2: #a040ff; --box2d: #4a0090;
  --box3: #00e0a0; --box3d: #005040;
  --box4: #ffa020; --box4d: #7a4000;
}

* { margin:0; padding:0; box-sizing:border-box; }

/* ── 픽셀 아트 핵심: 모든 요소에 image-rendering 적용 ── */
* { image-rendering: pixelated; image-rendering: crisp-edges; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Press Start 2P', monospace;
  overflow: hidden;
}

/* ── 픽셀 배경 패턴 ── */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    radial-gradient(circle, rgba(100,20,200,.15) 1px, transparent 1px);
  background-size: 24px 24px;
}

/* ── 픽셀 별 ── */
.stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
.star  {
  position:absolute;
  width:4px; height:4px; /* 픽셀 크기 */
  background:var(--white);
  image-rendering:pixelated;
  animation:starBlink var(--d) steps(1) infinite;
}
@keyframes starBlink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

/* ── 스캔라인 ── */
.scanlines {
  position:fixed; inset:0; pointer-events:none; z-index:300;
  background: repeating-linear-gradient(
    0deg, transparent 0px, transparent 3px,
    rgba(0,0,0,.08) 3px, rgba(0,0,0,.08) 4px
  );
}

/* ── 래퍼 ── */
.wrapper {
  position:relative; z-index:1;
  width:min(400px,100vw); min-width:100px;
  padding:12px 10px 20px;
  display:flex; flex-direction:column; align-items:center; gap:8px;
}

/* ── 픽셀 타이틀 ── */
.title {
  font-size:clamp(10px,3.5vw,16px);
  color: var(--gold);
  letter-spacing:.05em;
  text-shadow:
    3px 3px 0 #7a4a00,
    0 0 12px rgba(255,230,0,.6);
  animation: titleFlash 1.2s steps(1) infinite;
}
@keyframes titleFlash {
  0%,79%{ opacity:1; }
  80%,89%{ opacity:0; }
  90%,100%{ opacity:1; }
}

/* ══════════════════════════════════════════
   머신 컨테이너
══════════════════════════════════════════ */
.mc {
  position:relative; width:100%; max-width:380px;
  aspect-ratio:3/4.2;
}

/* ── [더미] 기계 몸체 — 픽셀 아트 박스 ── */
.machine-body {
  position:absolute; inset:0;
  background: var(--panel);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  /* 픽셀 테두리: box-shadow로 4px 격자 테두리 표현 */
  box-shadow:
    /* 외곽 굵은 테두리 */
    0 0 0 4px var(--border),
    0 0 0 8px var(--dark),
    /* 내부 하이라이트 */
    inset 4px 4px 0 rgba(255,255,255,.08),
    inset -4px -4px 0 rgba(0,0,0,.4),
    /* 외부 글로우 */
    0 0 24px rgba(106,31,194,.5),
    0 0 48px rgba(106,31,194,.2);
  image-rendering: pixelated;
}

/* 기계 상단 픽셀 장식 바 */
.machine-body::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:12px;
  background: repeating-linear-gradient(
    90deg,
    var(--border) 0px, var(--border) 8px,
    var(--border2) 8px, var(--border2) 16px
  );
  opacity:.7;
}

/* ── 픽셀 유리창 ── */
.machine-glass {
  position:absolute; top:10%; left:7%; right:7%; bottom:29%;
  background: transparent;
  image-rendering: pixelated;
}


/* ── 픽셀 크레딧 바 ── */
.credits-bar {
  position:absolute; top:4%; right:4%;
  z-index:15; white-space:nowrap;
}
.credit-item {
  font-size:clamp(6px,1.8vw,9px);
  color: var(--gold);
  background: var(--dark);
  border: 2px solid var(--gold);
  padding: 4px 8px;
  box-shadow: 2px 2px 0 #7a4a00, 0 0 8px rgba(255,230,0,.3);
  image-rendering: pixelated;
  letter-spacing:.02em;
}

/* ── 픽셀 사인 ── */
.pixel-sign {
  position:absolute; top:11%; left:50%; transform:translateX(-50%);
  z-index:15; white-space:nowrap;
  font-size:clamp(5px,1.5vw,7px);
  color: var(--cyan);
  background: var(--dark);
  border: 2px solid var(--cyan);
  padding: 3px 6px;
  box-shadow: 2px 2px 0 #004060, 0 0 8px rgba(0,229,255,.4);
  animation: signFlash 2s steps(1) infinite;
  letter-spacing:.05em;
}
/* 이미지로 교체 시: .pixel-sign-img 가 있으면 텍스트 숨김 */
.pixel-sign.has-img {
  background: none;
  border: none;
  box-shadow: none;
  padding: 0;
  color: transparent;
  font-size: 0;
}
.pixel-sign-img {
  display: block;
  /* 권장 사이즈: 240 × 32px (2x: 480×64px) */
  height: clamp(16px, 4vw, 24px);
  width: auto;
  image-rendering: pixelated;
}
@keyframes signFlash {
  0%,69%{opacity:1} 70%,79%{opacity:0} 80%,89%{opacity:1} 90%,94%{opacity:0} 95%,100%{opacity:1}
}

/* ══════════════════════════════════════════
   크레인
══════════════════════════════════════════ */
.crane-wrap {
  position:absolute; left:0; width:100%;
  display:flex; flex-direction:column; align-items:center;
  gap:0;
  z-index:30; pointer-events:none;
  top:0; transform:translateX(0);
}

/* ── [더미] 크레인 암 — 픽셀 와이어 ── */
.crane-arm {
  width:6px; height:70px;
  background: repeating-linear-gradient(
    180deg,
    #c0c0d0 0px, #c0c0d0 4px,
    #606080 4px, #606080 8px
  );
  box-shadow: 2px 0 0 #303040, 0 0 6px rgba(0,229,255,.3);
  image-rendering: pixelated;
}

/* ── 집게 컨테이너 ── */
.claw-container {
  position:relative; width:64px; height:44px;
  margin-top:0;
}
.claw-img {
  position:absolute; inset:0;
  transition: opacity .2s steps(1); /* 픽셀: 스텝 전환 */
  image-rendering: pixelated;
}

/* 열린 집게 — CSS 픽셀 아트 */
.claw-open {
  opacity:1;
}
.claw-open .px-claw { display:block; }

/* ── SVG 픽셀 집게 ── */
.px-claw {
  width:64px; height:44px;
}

/* ── 집어올린 상자 ── */
.grabbed-box {
  width: 88px; height: calc(88px * 6/5);
  margin-top: -22px; /* 집게 높이(44px)의 절반만큼 겹침 */
  image-rendering: pixelated;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center top;
  filter: drop-shadow(2px 2px 2px rgba(0,0,0,.7));
}

/* ══════════════════════════════════════════
   상자들
══════════════════════════════════════════ */
.boxes-scene {
  position:absolute; bottom:28%; left:0; right:0; height:42%;
  display:flex; align-items:flex-end; justify-content:center;
  pointer-events:none; z-index:15;
}
.box-stack {
  width:88%; height:100%;
  display:flex; align-items:flex-end; justify-content:center; gap:6px;
  pointer-events:none;
}

.box { flex:1; max-width:88px; aspect-ratio:5/6; transition:opacity .15s steps(1); cursor:default; }
.box.gone { opacity:0; }

/* 픽셀 상자 — 이미지 버전 */
.box-inner {
  width:100%; height:100%;
  image-rendering: pixelated;
  background: transparent;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center bottom;
}

/* 픽셀 흔들기 */
.box.shake { animation: pxShake .4s steps(2) 3; }
@keyframes pxShake {
  0%  { transform: translate(0,0); }
  25% { transform: translate(-4px,-4px); }
  50% { transform: translate(4px,0); }
  75% { transform: translate(-4px,4px); }
  100%{ transform: translate(0,0); }
}

/* ── [더미] 상자 오버레이 최상위 ── */
.boxes-overlay {
  position:absolute; bottom:27%; left:5%; right:5%; height:32%;
  pointer-events:none; z-index:35;
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center bottom;
}


/* ══════════════════════════════════════════
   하단 버튼 영역
══════════════════════════════════════════ */
.machine-bottom {
  position:absolute; bottom:0; left:0; right:0; height:27%;
  background: transparent;
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:6px; padding-bottom:10px; z-index:40;
}

/* ── 픽셀 버튼 ── */
.btn-play { cursor:pointer; border:none; background:none; padding:0; }
.btn-play-inner {
  width:140px; height:44px;
  background: var(--btn-top);
  font-family: 'Press Start 2P', monospace;
  font-size:8px; color:#fff; letter-spacing:.04em;
  display:flex; align-items:center; justify-content:center;
  /* 픽셀 버튼 그림자 */
  box-shadow:
    0 4px 0 var(--btn-bot),
    0 5px 0 #300010,
    inset 0 2px 0 rgba(255,255,255,.3),
    inset 0 -2px 0 rgba(0,0,0,.2);
  image-rendering: pixelated;
  transition: transform .08s steps(1), box-shadow .08s steps(1);
}
.btn-play:hover .btn-play-inner {
  background: #ff5fb4;
}
.btn-play:active .btn-play-inner {
  transform: translateY(3px);
  box-shadow:
    0 1px 0 var(--btn-bot),
    0 2px 0 #300010,
    inset 0 2px 0 rgba(0,0,0,.2);
}
.btn-play:disabled { opacity:.35; pointer-events:none; }
.btn-note { font-size:6px; color:rgba(255,63,164,.4); letter-spacing:.02em; }

/* ══════════════════════════════════════════
   결과 오버레이
══════════════════════════════════════════ */
.result-overlay {
  position:fixed; inset:0;
  background: rgba(8,1,15,.88);
  z-index:100;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .25s steps(4);
  /* 오버레이 자체가 스크롤 안 되도록 */
  overflow:hidden;
}
.result-overlay.show { opacity:1; pointer-events:auto; }

/*
┌─────────────────────────────────────────────────────┐
│  결과 카드 이미지 교체:                                 │
│  .result-card { background-image:url('card.png'); }  │
│  카드 사이즈: 720 × 960px (2x)                        │
└─────────────────────────────────────────────────────┘
*/
.result-card {
  position:relative;
  width:min(320px,88vw);
  background: var(--panel);
  box-shadow:
    0 0 0 4px var(--border2),
    0 0 0 8px var(--dark),
    8px 8px 0 var(--dark),
    0 0 40px rgba(255,45,120,.4);
  display:flex; flex-direction:column; align-items:center;
  animation: cardPop .2s steps(3) both;
  image-rendering: pixelated;
}
@keyframes cardPop {
  from { transform:scale(.5); opacity:0; }
  to   { transform:scale(1);  opacity:1; }
}

/* 카드 상단 픽셀 바 */
.result-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:8px;
  background: repeating-linear-gradient(
    90deg, var(--border2) 0, var(--border2) 8px,
    var(--gold) 8px, var(--gold) 16px
  );
}

/*
┌─────────────────────────────────────────────────────┐
│  상품 이미지:  400 × 400px (2x 대응)                  │
│  JS: document.getElementById('rItemImg').src = ...  │
└─────────────────────────────────────────────────────┘
*/
.result-item-img {
  position:relative; z-index:1;
  width:220px; height:220px;
  margin:24px auto 12px;
  background: var(--dark);
  box-shadow:
    0 0 0 3px var(--cyan),
    0 0 0 6px var(--dark),
    4px 4px 0 rgba(0,0,0,.5);
  display:flex; align-items:center; justify-content:center;
  animation: imgPop .25s steps(4) both .05s;
  image-rendering: pixelated;
}
@keyframes imgPop {
  from{ transform:scale(0); opacity:0; }
  to  { transform:scale(1); opacity:1; }
}
.result-item-img img {
  width:100%; height:100%; object-fit:contain;
  image-rendering: pixelated;
}
.img-dummy {
  font-size:48px; line-height:1;
  image-rendering:pixelated;
}

.result-info {
  position:relative; z-index:1;
  width:100%; padding:8px 16px 20px;
  display:flex; flex-direction:column; align-items:center; gap:10px;
}

/* 픽셀 등급 뱃지 */
.result-rarity {
  font-size:8px; letter-spacing:.06em;
  padding: 5px 10px;
  box-shadow: 2px 2px 0 rgba(0,0,0,.5);
  image-rendering: pixelated;
}
.rarity-common { background:#333; color:#aaa; box-shadow:2px 2px 0 #111; }
.rarity-rare   { background:#003380; color:#88ccff; box-shadow:2px 2px 0 #001140; }
.rarity-epic   { background:#440088; color:#dd88ff; box-shadow:2px 2px 0 #220044; }
.rarity-legend {
  background:#7a4000; color:var(--gold);
  box-shadow:2px 2px 0 #3a1a00, 0 0 10px rgba(255,230,0,.4);
  animation: legendBlink .6s steps(1) infinite;
}
@keyframes legendBlink {
  0%,49%{ box-shadow:2px 2px 0 #3a1a00, 0 0 10px rgba(255,230,0,.4); }
  50%,100%{ box-shadow:2px 2px 0 #3a1a00, 0 0 20px rgba(255,230,0,.7); }
}

/* 픽셀 상품명 */
.result-name {
  font-size:clamp(9px,3vw,13px); color:var(--white);
  text-align:center; line-height:1.7;
  text-shadow: 2px 2px 0 var(--dark);
}

/*
┌─────────────────────────────────────────────────────┐
│  닫기 버튼 이미지:  624 × 96px (2x 대응)               │
└─────────────────────────────────────────────────────┘
*/
.btn-close {
  width:100%; padding:12px 0;
  background: var(--btn-top);
  border:none; color:#fff;
  font-family:'Press Start 2P',monospace; font-size:9px; letter-spacing:.04em;
  cursor:pointer;
  box-shadow:
    0 4px 0 var(--btn-bot),
    0 5px 0 #300010,
    inset 0 2px 0 rgba(255,255,255,.25);
  image-rendering:pixelated;
  transition: transform .08s steps(1), box-shadow .08s steps(1);
}
.btn-close:active {
  transform:translateY(3px);
  box-shadow: 0 1px 0 var(--btn-bot), 0 2px 0 #300010;
}

/* ══════════════════════════════════════════
   스토어 이동 오버레이 (마지막 뽑기 후)
══════════════════════════════════════════ */
.store-overlay {
  position:fixed; inset:0;
  background: rgba(8,1,15,.96);
  z-index:200;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:0;
  opacity:0; pointer-events:none;
  transition: opacity .25s steps(4);
}
.store-overlay.show { opacity:1; pointer-events:auto; }

/* 픽셀 로고/타이틀 영역 */
.store-title {
  font-size:clamp(9px,2.8vw,13px);
  color: var(--gold);
  text-shadow: 2px 2px 0 #7a4a00, 0 0 12px rgba(255,230,0,.5);
  text-align:center; line-height:2;
  margin-bottom:20px;
  animation: titleFlash 1.2s steps(1) infinite;
}
.store-title span {
  display:block;
  font-size:clamp(6px,1.8vw,9px);
  color: var(--white);
  text-shadow: 1px 1px 0 #333;
  animation: none;
  opacity:.7;
}

/* 스토어 버튼 공통 */
.store-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:min(260px,80vw); padding:14px 0;
  font-family:'Press Start 2P',monospace;
  font-size:clamp(7px,2vw,10px); letter-spacing:.04em;
  cursor:pointer; border:none;
  text-decoration:none; color:#fff;
  image-rendering:pixelated;
  transition: transform .08s steps(1), box-shadow .08s steps(1);
  margin-bottom:12px;
}
.store-btn:active { transform:translateY(3px); }

.store-btn-aos {
  background: #2d9e4a;
  box-shadow: 0 4px 0 #145a24, 0 5px 0 #0a2a10,
    inset 0 2px 0 rgba(255,255,255,.2);
}
.store-btn-aos:hover { background:#38c45c; }
.store-btn-aos:active { box-shadow:0 1px 0 #145a24, 0 2px 0 #0a2a10; }

.store-btn-ios {
  background: #1a6bc9;
  box-shadow: 0 4px 0 #0a3a7a, 0 5px 0 #051530,
    inset 0 2px 0 rgba(255,255,255,.2);
}
.store-btn-ios:hover { background:#2280e8; }
.store-btn-ios:active { box-shadow:0 1px 0 #0a3a7a, 0 2px 0 #051530; }

/* 둘 다 보여주는 버전 (태블릿/PC) */
.store-btn-both { margin-bottom:12px; }

/* 픽셀 아이콘 */
.store-icon { font-size:18px; line-height:1; }

}
/* 오버레이 표시 중 body 밀림 방지 */
body.overlay-open {
  overflow: hidden;
  padding-right: var(--scrollbar-w, 0px);
}

.particle {
  position:fixed; pointer-events:none; z-index:110;
  width:6px; height:6px;
  image-rendering:pixelated;
  animation: pxFly var(--pd) steps(12) forwards;
}
@keyframes pxFly {
  0%  { transform:translate(0,0) rotate(0deg); opacity:1; }
  100%{ transform:translate(var(--px),var(--py)) rotate(360deg); opacity:0; }
}

@media (max-width:360px) {
  .mc { aspect-ratio:3/4.6; }
  .claw-container { width:52px; height:36px; }
  .grabbed-box { width:72px; height:calc(72px * 6/5); margin-top:-18px; }
  .px-claw { width:52px; height:36px; }
}
</style>
<script type="text/javascript" src="https://tpc.googlesyndication.com/pagead/gadgets/html5/api/exitapi.js"></script>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="scanlines"></div>

<div class="wrapper">
  <div class="title">★ LUCKY MACHINE ★</div>

  <div class="mc" id="mc">

    <!-- 기계 몸체 -->
    <div class="machine-body">
      <div class="machine-glass"></div>

      <div class="credits-bar">
        <div class="credit-item">TRIES: <span id="triesNum">3</span></div>
      </div>

      <!-- 상자들 -->
      <div class="boxes-scene">
        <div class="box-stack" id="boxStack"></div>
      </div>

      <!-- 버튼 영역 -->
      <div class="machine-bottom">
        <button class="btn-play" id="btnPlay">
          <div class="btn-play-inner">▶ START</div>
        </button>
        <div class="btn-note">[ 버튼 이미지 교체 가능 ]</div>
      </div>
    </div>

    <!-- 크레인 -->
    <div class="crane-wrap" id="craneWrap">
      <div class="crane-arm" id="craneArm"></div>
      <div class="claw-container">

        <!-- 열린 집게 (픽셀 SVG) -->
        <div class="claw-img claw-open">
          <svg class="px-claw" viewBox="0 0 16 11" xmlns="http://www.w3.org/2000/svg">
            <!-- 중앙 몸체 -->
            <rect x="6" y="0" width="4" height="3" fill="#c0c0d8"></rect>
            <rect x="7" y="0" width="2" height="1" fill="#e8e8ff"></rect>
            <!-- 왼쪽 암 -->
            <rect x="2" y="2" width="5" height="2" fill="#8888aa"></rect>
            <rect x="1" y="4" width="3" height="2" fill="#8888aa"></rect>
            <rect x="0" y="6" width="3" height="3" fill="#6666aa"></rect>
            <rect x="0" y="9" width="4" height="2" fill="#4444aa"></rect>
            <!-- 오른쪽 암 -->
            <rect x="9" y="2" width="5" height="2" fill="#8888aa"></rect>

/* ══ ASSETS 적용 ════════════════════════════════════════ */
function applyAssets() {
  const $ = id => document.getElementById(id);
  const s = (el, prop, val) => { if (el) el.style[prop] = val; };

  if (ASSETS.machineBg) {
    const el = document.querySelector('.machine-body');
    if (el) {
      el.style.backgroundImage    = `url('${ASSETS.machineBg}')`;
      el.style.backgroundSize     = 'cover';
      el.style.backgroundPosition = 'center';
      el.style.backgroundRepeat   = 'no-repeat';
    }
  }

  if (ASSETS.craneArm)
    s($('craneArm'), 'backgroundImage', `url('${ASSETS.craneArm}')`);

  if (ASSETS.clawOpen) {
    const el = document.querySelector('.claw-open');
    if (el) { el.innerHTML = `<img src="${ASSETS.clawOpen}" style="width:100%;height:100%;object-fit:contain;image-rendering:pixelated;">`; }
  }
  if (ASSETS.boxOverlay)
    s(document.querySelector('.boxes-overlay'), 'backgroundImage', `url('${ASSETS.boxOverlay}')`);

  if (ASSETS.btnPlay) {
    const btn = document.querySelector('.btn-play-inner');
    if (btn) {
      btn.style.backgroundImage = `url('${ASSETS.btnPlay}')`;
      btn.style.backgroundSize  = 'cover';
      btn.style.color           = 'transparent';
    }
  }

  if (ASSETS.resultCard) {
    const card = document.querySelector('.result-card');
    if (card) {
      card.style.backgroundImage = `url('${ASSETS.resultCard}')`;
      card.style.backgroundSize  = 'cover';
      card.style.border          = 'none';
    }
  }

  if (ASSETS.btnClose) {
    const btn = $('btnClose');
    if (btn) {
      btn.style.backgroundImage = `url('${ASSETS.btnClose}')`;
      btn.style.backgroundSize  = 'cover';
      btn.style.color           = 'transparent';
    }
  }
}
document.addEventListener('DOMContentLoaded', applyAssets);

/* ══ DOM ══════════════════════════════════════════════ */
const $mc      = document.getElementById('mc');
const $wrap    = document.getElementById('craneWrap');
const $arm     = document.getElementById('craneArm');
const $stack   = document.getElementById('boxStack');
const $btnPlay = document.getElementById('btnPlay');
const $tries   = document.getElementById('triesNum');
const $overlay = document.getElementById('resultOverlay');
document.getElementById('btnClose').onclick = onClose;

/* ══ 상태 ════════════════════════════════════════════ */
let running = false;
let tries   = 3;
let boxes   = [];

/* ══ 픽셀 별 생성 ════════════════════════════════════ */
const $stars = document.getElementById('stars');
for (let i = 0; i < 48; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(.4+Math.random()*1.2).toFixed(1)}s;animation-delay:${(Math.random()*2).toFixed(1)}s;opacity:${Math.random()>.3?1:0};`;
  $stars.appendChild(s);
}

/* ══ 크레인 헬퍼 ════════════════════════════════════ */
function craneTo(xPx, topPx, dur) {
  const ease = dur > 0 ? `top ${dur}ms steps(${Math.max(4,Math.round(dur/40))},end), transform ${dur}ms steps(${Math.max(4,Math.round(dur/40))},end)` : 'none';
  $wrap.style.transition = ease;
  $arm.style.transition  = dur > 0 ? `height ${dur}ms steps(${Math.max(4,Math.round(dur/40))},end)` : 'none';
  $wrap.style.top        = topPx + 'px';
  $wrap.style.transform  = `translateX(${xPx - $mc.offsetWidth / 2}px)`;
}
function armH(h, dur) {
  $arm.style.transition = dur > 0 ? `height ${dur}ms steps(${Math.max(4,Math.round(dur/40))},end)` : 'none';
  $arm.style.height = h + 'px';
}
function resetCrane() {
  $wrap.style.transition = 'none';
  $arm.style.transition  = 'none';
  $wrap.style.top        = '0px';
  $wrap.style.transform  = 'translateX(0px)';
  $arm.style.height      = '70px';
  $wrap.classList.remove('grabbed');
  const gb = $wrap.querySelector('.grabbed-box');
  if (gb) gb.remove();
}

const wait = ms => new Promise(r => setTimeout(r, ms));

/* ══ 상자 생성 ══════════════════════════════════════ */
function buildBoxes() {
  $stack.innerHTML = '';
  boxes = [];
  // 순서 섞기
  const order = [0,1,2,3].sort(() => Math.random() - .5);
  for (let i = 0; i < 4; i++) {
    const el    = document.createElement('div');
    el.className = 'box';
    el.dataset.imgIdx = order[i];
    const inner = document.createElement('div');
    inner.className = 'box-inner';
    inner.style.backgroundImage = `url('${BOX_IMGS[order[i]]}')`;
    el.appendChild(inner);
    $stack.appendChild(el);
    boxes.push(el);
  }
}
buildBoxes();
resetCrane();

/* ══ 뽑기 시작 ══════════════════════════════════════ */
$btnPlay.onclick = async () => {
  if (running || tries <= 0) return;
  running = true;
  $btnPlay.disabled = true;

  const mcH   = $mc.offsetHeight;

  const avail = boxes.filter(b => !b.classList.contains('gone'));
  if (!avail.length) { onClose(); return; }
  const target = avail[Math.floor(Math.random() * avail.length)];

  /* 타겟 X 미리 계산 */
  const mcRect  = $mc.getBoundingClientRect();
  const boxRect = target.getBoundingClientRect();
  const targetX = boxRect.left - mcRect.left + boxRect.width / 2;

  /* ① 수평 이동 (위에서 좌우로) */
  craneTo(targetX, 0, 450);
  await wait(480);

  /* ② 수직 하강 */
  const downTop = mcH * 0.30;
  const downArm = mcH * 0.30;
  craneTo(targetX, downTop, 900);
  armH(downArm, 900);

  /* 상자 흔들기 */
  await wait(250);
  boxes.forEach((b, i) => {
    if (b.classList.contains('gone')) return;
    setTimeout(() => b.classList.add('shake'),    i * 80);
    setTimeout(() => b.classList.remove('shake'), i * 80 + 400);
  });

  await wait(380);

  /* ③ 상자 집기 — 원본 먼저 숨기고 다음 프레임에 grabbed-box 부착 */
  const imgIdx = target.dataset.imgIdx;
  target.classList.add('gone');

  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  const gb = document.createElement('div');
  gb.className = 'grabbed-box';
  gb.style.backgroundImage = `url('${BOX_IMGS[imgIdx]}')`;
  $wrap.appendChild(gb);

  /* ⑤ 올라가기 */
  craneTo(targetX, 0, 500);
  armH(70, 500);
  await wait(600);

  /* ⑥ 결과 — 집은 상자에 연결된 상품 표시 */
  tries--;
  $tries.textContent = tries;
  const prize = BOXES[imgIdx];
  showResult(prize);
};

/* ══ 스토어 URL ═════════════════════════════════════
   AOS: Google Play
   IOS: App Store
════════════════════════════════════════════════════ */
const STORE_URL = {
  aos: 'https://play.google.com/store/apps/details?id=com.epixelgames.townguardians&hl=ko',
  ios: 'https://apps.apple.com/kr/app/%EC%98%A4%EB%8A%98%EB%8F%84-%EC%88%98%ED%98%B8%EC%A4%91-%EB%B0%A9%EC%B9%98%ED%98%95-rpg/id6748179942',
};

/* ── 기기 + 국가 감지 ──────────────────────────────
   플랫폼: iOS / Android / 그 외(PC·태블릿)
   국가:   언어 설정(navigator.language) 기반
   국가별 App Store 링크는 앞의 /kr/ 부분을 교체
────────────────────────────────────────────────── */
function getStoreInfo() {
  const ua   = navigator.userAgent || '';
  const lang = (navigator.language || 'ko').toLowerCase(); // 예: 'ko', 'en-us', 'ja'

  const isIOS     = /iphone|ipad|ipod/i.test(ua);
  const isAndroid = /android/i.test(ua);

  /* 국가 코드 추출 (en-US → us, ko-KR → kr, ja → jp 등) */
  const langParts = lang.split('-');
  const country   = langParts.length > 1 ? langParts[1] : langParts[0];

  /* App Store 국가 코드 매핑 */
  const iosCountryMap = {
    ko: 'kr', kr: 'kr',
    ja: 'jp', jp: 'jp',
    zh: 'cn', cn: 'cn', tw: 'tw',
    en: 'us', us: 'us', gb: 'gb',
    de: 'de', fr: 'fr',
  };
  const iosCountry = iosCountryMap[country] || iosCountryMap[langParts[0]] || 'us';

  /* Google Play 언어 파라미터 */
  const playLang = lang.startsWith('ko') ? 'ko'
    : lang.startsWith('ja') ? 'ja'
    : lang.startsWith('zh') ? 'zh'
    : 'en';

  /* URL 생성 */
  const iosBase = STORE_URL.ios.replace('/kr/', `/${iosCountry}/`);
  const aosBase = STORE_URL.aos.replace(/hl=[a-z]+/, `hl=${playLang}`);

  return { isIOS, isAndroid, iosUrl: iosBase, aosUrl: aosBase };
}

/* ── 스토어 버튼 렌더링 ── */
function renderStoreBtns() {
  const { isIOS, isAndroid, iosUrl, aosUrl } = getStoreInfo();
  const $btns = document.getElementById('storeBtns');
  $btns.innerHTML = '';

  const aosStyle = ASSETS.btnAos
    ? `style="background-image:url('${ASSETS.btnAos}');background-size:cover;color:transparent;"`  : '';
  const iosStyle = ASSETS.btnIos
    ? `style="background-image:url('${ASSETS.btnIos}');background-size:cover;color:transparent;"` : '';

  const aosInner = ASSETS.btnAos ? '' : '<span class="store-icon">▶</span> GOOGLE PLAY';
  const iosInner = ASSETS.btnIos ? '' : '<span class="store-icon">🍎</span> APP STORE';

  const aosBtn = `<a class="store-btn store-btn-aos store-btn-both" href="${aosUrl}" target="_blank" rel="noopener" onclick="if(typeof ExitApi!=='undefined'){ExitApi.exit();return false;}" ${aosStyle}>${aosInner}</a>`;
  const iosBtn = `<a class="store-btn store-btn-ios store-btn-both" href="${iosUrl}" target="_blank" rel="noopener" onclick="if(typeof ExitApi!=='undefined'){ExitApi.exit();return false;}" ${iosStyle}>${iosInner}</a>`;

  if (isIOS)         $btns.innerHTML = iosBtn;
  else if (isAndroid) $btns.innerHTML = aosBtn;
  else               $btns.innerHTML = aosBtn + iosBtn;
}

/* ── 스토어 오버레이 표시 ── */
function showStoreOverlay() {
  renderStoreBtns();
  document.getElementById('storeOverlay').classList.add('show');
}
function showResult(p) {
  document.getElementById('rName').textContent   = p.name;
  const $rar = document.getElementById('rRarity');
  $rar.textContent = p.label;
  $rar.className   = 'result-rarity rarity-' + p.rarity;

  const $img   = document.getElementById('rItemImg');
  const $dummy = document.getElementById('rImgDummy');
  if (p.prizeImg) {
    $img.src = p.prizeImg; $img.alt = p.name;
    $img.style.display = 'block'; $dummy.style.display = 'none';
  } else {
    $img.style.display   = 'none';
    $dummy.style.display = 'block';
    $dummy.textContent   = p.emoji;
    $dummy.style.fontSize = '56px';
  }

  /* 스크롤바 너비 보정 → body 밀림 방지 */
  const sbW = window.innerWidth - document.documentElement.clientWidth;
  document.documentElement.style.setProperty('--scrollbar-w', sbW + 'px');
  document.body.classList.add('overlay-open');

  $overlay.classList.add('show');
  spawnParticles(p.color);
}

/* ══ 닫기 ══════════════════════════════════════════ */
function onClose() {
  $overlay.classList.remove('show');
  document.body.classList.remove('overlay-open');
  resetCrane();
  const rem = boxes.filter(b => !b.classList.contains('gone'));

  /* 마지막 뽑기(tries===0) → 스토어 이동 화면 */
  if (tries <= 0 || !rem.length) {
    setTimeout(() => showStoreOverlay(), 300);
  } else {
    $btnPlay.disabled = false; running = false;
  }
}

/* ══ 픽셀 파티클 ═══════════════════════════════════ */
function spawnParticles(color) {
  const colors = [color, '#ffe600', '#ff2d78', '#00e5ff', '#ffffff'];
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const a = Math.random() * Math.PI * 2;
    const d = 80 + Math.random() * 160;
    const size = [4,6,8][Math.floor(Math.random()*3)];
    p.style.cssText = `width:${size}px;height:${size}px;left:50%;top:40%;background:${colors[~~(Math.random()*colors.length)]};--px:${(Math.cos(a)*d).toFixed(0)}px;--py:${(Math.sin(a)*d).toFixed(0)}px;--pd:${(.5+Math.random()*.7).toFixed(2)}s;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}
</script>
